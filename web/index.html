<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Agency</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Cloudflare Web Analytics. TODO: replace PLACEHOLDER_CF_ANALYTICS_TOKEN with the real beacon token from the Cloudflare dashboard. -->
    <!-- No SRI hash: Cloudflare rotates beacon.min.js server-side; the official snippet ships without integrity. -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "PLACEHOLDER_CF_ANALYTICS_TOKEN"}'
    ></script>
  </body>
</html>
